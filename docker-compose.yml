version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: enzymeml_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: enzymeml
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: enzymeml_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enzymeml_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/enzymeml
      JWT_SECRET: change-this-in-production
      JWT_REFRESH_SECRET: change-this-in-production-too
      PORT: 4000
      FRONTEND_URL: http://localhost:5173
      UPLOAD_DIR: /app/uploads
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  uploads_data:
